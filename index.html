<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frozen 2 English Explorer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #scene-container {
            position: relative;
            padding: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #emoji-fallback {
            font-size: 100px;
            position: absolute;
            z-index: 1;
        }
        #scene-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            image-rendering: pixelated;
            position: absolute;
            z-index: 2;
            /* Hide the broken image icon if image doesn't exist */
            color: transparent;
        }
    </style>
</head>
<body>
    <h1>❄️ Frozen 2 Picture Explorer ❄️</h1>
    <div id="progress">Pictures explored today: <span id="view-count">1</span> 🌟</div>

    <div id="scene-tag" style="font-size: 18px; color: #00838f; font-weight: bold; margin-bottom: 10px;"></div>

    <div id="scene-container">
        <div id="emoji-fallback">👸🏼🐴🌊</div>
        <img id="scene-image" src="scene_0.png" alt="" onerror="this.style.display='none'">
    </div>

    <div id="answer-box">Look *here* at the picture! 🧐 Click a button!</div>

    <div class="controls">
        <button class="btn btn-who" onclick="showAnswer('who')">Who?</button>
        <button class="btn btn-what" onclick="showAnswer('what')">What?</button>
        <button class="btn btn-where" onclick="showAnswer('where')">Where?</button>
        <button class="btn btn-when" onclick="showAnswer('when')">When?</button>
        <button class="btn btn-why" onclick="showAnswer('why')">Why?</button>
    </div>

    <div class="nav-controls">
        <button class="btn btn-nav" onclick="nextScene()">Random Picture 🎲➡️</button>
    </div>

    <script src="scenarios.js"></script>
    <script src="app.js"></script>
</body>
</html>
